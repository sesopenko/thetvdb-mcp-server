name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

      - name: Check types
        run: uv run mypy src/

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/

  test-template-apply:
    name: Template apply test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Copy repo to temp directory
        run: cp -r . "$RUNNER_TEMP/test-apply"

      - name: Override project.env with test identity
        working-directory: ${{ runner.temp }}/test-apply
        run: |
          cat > project.env << 'EOF'
          DOCKER_IMAGE=testorg/my-mcp-server
          PROJECT_NAME=my-mcp-server
          PACKAGE_NAME=my_mcp_server
          MCP_SERVER_NAME=my-mcp-server
          PROJECT_DESCRIPTION=Template apply test
          EOF

      - name: Run apply-project-config.sh
        working-directory: ${{ runner.temp }}/test-apply
        run: bash scripts/apply-project-config.sh

      - name: Install dependencies (re-sync after pyproject.toml rename)
        working-directory: ${{ runner.temp }}/test-apply
        run: uv sync

      - name: Run unit tests
        working-directory: ${{ runner.temp }}/test-apply
        run: uv run pytest tests/unit/

      - name: Create config.toml for server smoke-start
        working-directory: ${{ runner.temp }}/test-apply
        run: |
          cat > config.toml << 'EOF'
          [server]
          host = "127.0.0.1"
          port = 8765

          [logging]
          level = "info"
          EOF

      - name: Smoke-start server and verify it stays up
        working-directory: ${{ runner.temp }}/test-apply
        run: |
          PACKAGE_NAME=$(sed -n 's/^PACKAGE_NAME=//p' project.env)
          uv run python -m "$PACKAGE_NAME" &
          SERVER_PID=$!
          sleep 3
          if kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Server started successfully (PID $SERVER_PID)"
            kill "$SERVER_PID"
          else
            echo "Server failed to start or crashed immediately"
            exit 1
          fi
